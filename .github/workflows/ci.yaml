name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.6
          cache: true

      - name: Resolve dependencies
        run: flutter pub get

      - name: Generate dummy .env for build/test
        run: |
          cat > .env <<'EOF'
          SUPABASE_URL=https://example.supabase.co
          SUPABASE_ANON_KEY=dummy-anon-key-for-ci
          SENTRY_DSN=
          EOF

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test
